name: 3D Obj スクリプトを実行し、プッシュしてください

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動実行もできるようにしておきましょう！

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # プッシュするために書き込み権限が必要です！

    steps:
      - name: リポジトリをご確認ください
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存関係をインストール
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Obj.js を実行
        run: node 3D/obj.js # パスはリポジトリのルートからの相対パスです

      - name: Git の設定とプッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミットしてプッシュします！
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "chore: 3D/obj.js による自動更新 [skip ci]"
            git push
          else
            echo "変更がなかったので、プッシュはスキップするよ！"
          fi
